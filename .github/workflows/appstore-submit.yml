name: Release → App Store Connect

on:
  workflow_dispatch:

jobs:
  submit:
    runs-on: macos-26

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Select Xcode 26 ────────────────────────────────────────────
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest'

      # ── 3. Download iOS Platform ──────────────────────────────────────
      - name: Download iOS Platform
        run: |
          sudo xcodebuild -license accept
          xcodebuild -downloadPlatform iOS

      # ── 4. Auto-increment build number ───────────────────────────────
      - name: Set build number
        run: |
          BUILD=$(git rev-list --count HEAD)
          echo "Build number: $BUILD"
          sed -i '' "s/CURRENT_PROJECT_VERSION = [0-9]*/CURRENT_PROJECT_VERSION = $BUILD/g" \
            MarketAtlas.xcodeproj/project.pbxproj

      # ── 4. Install Apple Distribution certificate ─────────────────────
      - name: Install certificate
        env:
          P12_BASE64: ${{ secrets.APPLE_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.APPLE_P12_PASSWORD }}
        run: |
          KEYCHAIN=$RUNNER_TEMP/signing.keychain-db
          security create-keychain -p "" $KEYCHAIN
          security set-keychain-settings -lut 21600 $KEYCHAIN
          security unlock-keychain -p "" $KEYCHAIN
          echo -n "$P12_BASE64" | base64 --decode -o $RUNNER_TEMP/cert.p12
          security import $RUNNER_TEMP/cert.p12 -P "$P12_PASSWORD" \
            -A -t cert -f pkcs12 -k $KEYCHAIN
          security list-keychain -d user -s $KEYCHAIN

      # ── 5. Install App Store provisioning profile ─────────────────────
      - name: Install provisioning profile
        env:
          APPSTORE_PROFILE_BASE64: ${{ secrets.APPSTORE_PROVISIONING_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo -n "$APPSTORE_PROFILE_BASE64" | base64 --decode \
            -o ~/Library/MobileDevice/Provisioning\ Profiles/appstore.mobileprovision

      # ── 6. Build Release archive ──────────────────────────────────────
      - name: Archive (Release)
        run: |
          xcodebuild archive \
            -project MarketAtlas.xcodeproj \
            -scheme MarketAtlas \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath $RUNNER_TEMP/MarketAtlas.xcarchive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=AY6Y6KCP7Y \
            "CODE_SIGN_IDENTITY=Apple Distribution" \
            OTHER_CODE_SIGN_FLAGS="--keychain $RUNNER_TEMP/signing.keychain-db" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            ENABLE_BITCODE=NO \
            "EXCLUDED_ARCHS[sdk=iphonesimulator*]=arm64"

      # ── 7. Export IPA (App Store) ─────────────────────────────────────
      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/MarketAtlas.xcarchive \
            -exportPath $RUNNER_TEMP/ipa \
            -exportOptionsPlist ExportOptionsAppStore.plist

      # ── 8. Upload to App Store Connect ────────────────────────────────
      - name: Upload to App Store Connect
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_KEY_BASE64 }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo -n "$APP_STORE_CONNECT_KEY_BASE64" | base64 --decode \
            -o ~/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8
          xcrun altool --upload-app \
            -f $RUNNER_TEMP/ipa/MarketAtlas.ipa \
            -t ios \
            --apiKey "$APP_STORE_CONNECT_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID"
