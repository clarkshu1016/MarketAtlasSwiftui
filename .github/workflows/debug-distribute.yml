name: Debug → Firebase App Distribution

# Triggers only when a PR is merged into main
on:
  push:
    branches:
      - main

jobs:
  distribute:
    runs-on: macos-15

    steps:
      # ── 1. Checkout (full history for git commit count) ──────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Auto-increment build number = total git commit count ──────
      - name: Set build number
        run: |
          BUILD=$(git rev-list --count HEAD)
          echo "Build number: $BUILD"
          sed -i '' "s/CURRENT_PROJECT_VERSION = [0-9]*/CURRENT_PROJECT_VERSION = $BUILD/g" \
            MarketAtlas.xcodeproj/project.pbxproj

      # ── 3. Install Apple signing certificate ─────────────────────────
      - name: Install certificate
        env:
          P12_BASE64: ${{ secrets.APPLE_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.APPLE_P12_PASSWORD }}
        run: |
          KEYCHAIN=$RUNNER_TEMP/signing.keychain-db
          security create-keychain -p "" $KEYCHAIN
          security set-keychain-settings -lut 21600 $KEYCHAIN
          security unlock-keychain -p "" $KEYCHAIN
          echo -n "$P12_BASE64" | base64 --decode -o $RUNNER_TEMP/cert.p12
          security import $RUNNER_TEMP/cert.p12 -P "$P12_PASSWORD" \
            -A -t cert -f pkcs12 -k $KEYCHAIN
          security list-keychain -d user -s $KEYCHAIN

      # ── 4. Install provisioning profile ──────────────────────────────
      - name: Install provisioning profile
        env:
          PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo -n "$PROFILE_BASE64" | base64 --decode \
            -o ~/Library/MobileDevice/Provisioning\ Profiles/adhoc.mobileprovision

      # ── 5. Build DEBUG archive ────────────────────────────────────────
      - name: Archive (Debug)
        run: |
          xcodebuild archive \
            -project MarketAtlas.xcodeproj \
            -scheme MarketAtlas \
            -configuration Debug \
            -destination "generic/platform=iOS" \
            -archivePath $RUNNER_TEMP/MarketAtlas.xcarchive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=AY6Y6KCP7Y \
            "CODE_SIGN_IDENTITY=Apple Distribution" \
            OTHER_CODE_SIGN_FLAGS="--keychain $RUNNER_TEMP/signing.keychain-db"

      # ── 6. Export IPA (Ad Hoc for Firebase distribution) ─────────────
      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/MarketAtlas.xcarchive \
            -exportPath $RUNNER_TEMP/ipa \
            -exportOptionsPlist ExportOptionsDebug.plist

      # ── 7. Upload to Firebase App Distribution ────────────────────────
      - name: Upload to Firebase App Distribution
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > $RUNNER_TEMP/service-account.json
          npm install -g firebase-tools
          export GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/service-account.json
          firebase appdistribution:distribute $RUNNER_TEMP/ipa/MarketAtlas.ipa \
            --app ${{ secrets.FIREBASE_APP_ID }} \
            --groups "testers" \
            --release-notes "Branch: ${{ github.ref_name }}
Commit: ${{ github.sha }}
${{ github.event.head_commit.message }}"
